<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' https://denall-esg-jenkins.s3.ap-northeast-2.amazonaws.com"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSSTEM</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div id="header-left">
          <button id="back-btn" disabled title="뒤로가기">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"
              />
            </svg>
          </button>
          <img
            id="header-logo"
            src="https://denall-esg-jenkins.s3.ap-northeast-2.amazonaws.com/bi-denall-m.png?ver=20260330"
            onerror="this.onerror = null; this.src = 'https://denall-esg-jenkins.s3.ap-northeast-2.amazonaws.com/bi-denall-m.png'"
            alt="denall"
          />
        </div>
        <button id="login-btn">로그인</button>
      </header>
      <main id="content">
        <webview id="webview" src="" allowpopups></webview>
      </main>
    </div>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
