<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>환경설정</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="settings-app">
      <nav id="settings-sidebar">
        <ul id="settings-menu"></ul>
      </nav>
      <main id="settings-content">
        <section data-category="general">
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-label">시작 시 자동 실행</span>
              <span class="setting-description"
                >Windows 시작 시 OSSTEM을 자동으로 실행합니다.</span
              >
            </div>
            <label class="toggle">
              <input type="checkbox" id="auto-launch-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>
        <section data-category="notifications" class="hidden">
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-label">토스트 알림</span>
              <span class="setting-description"
                >새 메시지 수신 시 화면에 토스트 알림을 표시합니다.</span
              >
            </div>
            <label class="toggle">
              <input type="checkbox" id="notification-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-label">알림 소리</span>
              <span class="setting-description"
                >새 메시지 수신 시 알림 소리를 재생합니다.</span
              >
            </div>
            <label class="toggle">
              <input type="checkbox" id="sound-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
